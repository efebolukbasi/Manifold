name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @manifold/sdk --filter @manifold/core --filter @manifold/adapter-claude --filter @manifold/cli build

      - name: Build desktop app assets
        run: pnpm --filter @manifold/desktop build:app

      - name: Type check
        run: pnpm --filter @manifold/sdk --filter @manifold/core --filter @manifold/adapter-claude --filter @manifold/cli typecheck

      - name: Test
        run: pnpm -r --if-present test
        continue-on-error: true
